<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Birthday Gift</title>

  <link rel="stylesheet" href="style.css">
</head>
<body class="non-draggable">
  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click">
      <label for="click" class="click"></label>
      <div class="wishes">december 31st</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click2">
      <label for="click2" class="click2"></label>
      <div class="wishes2">last day of the year</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click3">
      <label for="click3" class="click3"></label>
      <div class="wishes3">when everyone's celebrating-</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click4">
      <label for="click4" class="click4"></label>
      <div class="wishes4">-"your" birthday</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click5">
      <label for="click5" class="click5"></label>
      <div class="wishes5">and you're just sitting-</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click6">
      <label for="click6" class="click6"></label>
      <div class="wishes6">-doing nothing special</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click7">
      <label for="click7" class="click7"></label>
      <div class="wishes7">and expecting me to code</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click8">
      <label for="click8" class="click8"></label>
      <div class="wishes8">too bad, life's hard</div>
    </div>
	</div>

  <div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="click9">
      <label for="click9" class="click9"></label>
      <div class="wishes9">i'm 11, by the way</div>
    </div>
	</div>

	<div class="giftcontainer">
		<div class="gift">
      <input type="checkbox" id="clickC">
      <label for="clickC" class="clickC"></label>
      <div class="wishesC">happy birthday old man</div>
    </div>
	</div>
  
  <div class="open">
    <span>Open the boxes!</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
  <script>
    document.getElementById("clickC").addEventListener("change", function() {
      if (this.checked) {
        confetti();
        var duration = 15 * 1000;
        var animationEnd = Date.now() + duration;
        var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
          return Math.random() * (max - min) + min;
        }

        var interval = setInterval(function() {
          var timeLeft = animationEnd - Date.now();

          if (timeLeft <= 0) {
            return clearInterval(interval);
          }

          var particleCount = 50 * (timeLeft / duration);
          // since particles fall down, start a bit higher than random
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
          confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
      }
    });
  </script>
</body>
</html>
